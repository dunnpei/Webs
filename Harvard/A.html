<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>大學城哈佛-AI助理</title>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { border:none; width:100%; height:100vh; }  /* 改用 100vh 比較穩 */
  </style>
</head>
<body>
  <iframe 
    allow="microphone" 
    frameborder="0" 
    src="https://udify.app/chat/mfrY8f637LVHLCMu" 
    id="chat-iframe">
  </iframe>

  <script>
    const iframe = document.getElementById('chat-iframe');

    // 監聽 resize（鍵盤彈出會觸發 window resize）
    window.addEventListener('resize', () => {
      // 強制重設 iframe 高度為目前可視高度
      iframe.style.height = window.visualViewport?.height + 'px' || window.innerHeight + 'px';
    });

    // 更好的方式：使用 visualViewport（現代瀏覽器支援很好）
    if ('visualViewport' in window) {
      window.visualViewport.addEventListener('resize', () => {
        iframe.style.height = window.visualViewport.height + 'px';
        // 或者直接滾動到最底
        setTimeout(() => {
          window.scrollTo(0, document.body.scrollHeight);
        }, 100);
      });
    }

    // 額外：focus 時嘗試滾動（雖然 iframe 內部難控制，但外層可以試）
    iframe.addEventListener('load', () => {
      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const inputs = iframeDoc.querySelectorAll('input, textarea');
        inputs.forEach(input => {
          input.addEventListener('focus', () => {
            setTimeout(() => {
              input.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 300);
          });
        });
      } catch(e) {
        console.log('無法存取 iframe 內容（跨域）', e);
      }
    });
  </script>
</body>
</html>
